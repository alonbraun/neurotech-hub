[build]
  command = "npm run build"
  publish = ".next"

[[redirects]]
  from = "www.neurotech.com/*"
  to = "https://neurotech.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
